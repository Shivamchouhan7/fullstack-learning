<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Ticket Discount System</title>
</head>
<body>
    <script>
        let age=10;
        let gender='female';
        let discount;

        if(age<=5){
            discount=100;
        }
        else if(age>5 && age<=8 || gender==='female'){
            discount=50;
        }
        else if(age>65){
            discount=70;
        }
        
        else{
            discount=0;
        }
        console.log(`Your final discount is ${discount}`);

    </script>
    
</body>
</html>

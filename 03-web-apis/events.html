<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events in JavaScript</title>
</head>
<body>
    <h1>Events in JavaScript</h1>
    
    <h2>Click Event</h2>
    <button id="myButton">Click Me!</button>
    
    <h2>Mouseover Event</h2>
    <div id="myBox" style="width: 200px; height: 200px; background-color: lightcoral; padding: 20px; margin: 20px 0;">
        Hover over me!
    </div>
    
    <h2>Keydown Event</h2>
    <input type="text" id="myInput" placeholder="Press any key and check the console">

    <h2>Submit Event</h2>
    <form id="myForm">
        <input type="text" placeholder="Enter your name" required>
        <button type="submit">Submit</button>
    </form>

    <h2>Change Event</h2>
    <select id="mySelect">
        <option value="">Select a value</option>
        <option value="apple">Apple</option>
        <option value="banana">Banana</option>
        <option value="mango">Mango</option>
    </select>

    <p>Open the browser console to see the event logs.</p>
    
    <script src="events.js"></script>
</body>
</html>
